services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api-1:
    build: .
    ports:
    - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_FPS=1
      - RATE_LIMIT_MAX=5
    depends_on:
      - redis

  api-2:
    build: .
    ports:
    - "8081:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_FPS=1
      - RATE_LIMIT_MAX=5
    depends_on:
      - redis
  
  api-3:
    build: .
    ports:
    - "8082:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT_FPS=1
      - RATE_LIMIT_MAX=5
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
    - api-1
    - api-2
    - api-3

  prometheus:
    image: prom/prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
    - api-1
    - api-2
    - api-3

  grafana:
      image: grafana/grafana-oss
      ports:
        - "3000:3000"
      volumes:
        - ./grafana/provisioning:/etc/grafana/provisioning
        - grafana-storage:/var/lib/grafana
      environment:
        - GF_SECURITY_ADMIN_PASSWORD=admin
      depends_on:
        - prometheus

volumes:
  grafana-storage: